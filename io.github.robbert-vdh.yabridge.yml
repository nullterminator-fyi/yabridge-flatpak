id: io.github.robbert_vdh.yabridgectl
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Compat.i386
  - org.freedesktop.Sdk.Extension.toolchain-i386
  - org.freedesktop.Sdk.Extension.mingw-w64
  - org.freedesktop.Sdk.Extension.rust-stable
command: yabridgectl

add-extensions:
  org.freedesktop.LinuxAudio.Plugins.yabridge:
    version: "25.08"
    directory: extensions/Plugins/yabridge
    add-ld-path: lib
    bundle: true
    autodelete: false

modules:
  - wine.yml

  - name: yabridge
    buildsystem: meson
    build-options:
      append-path: /app/extensions/Plugins/yabridge/bin
      append-ld-library-path: /app/extensions/Plugins/yabridge/lib
      # Make sure 32-bit dependencies are on pkg-config search path
      prepend-pkg-config-path: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/i386-linux-gnu/pkgconfig
      # Add the cross-compiler to PATH
      prepend-path: /usr/lib/sdk/toolchain-i386/bin

    config-opts:
      - --buildtype=release
      - --cross-file=../cross-wine.conf
      - -Dbitbridge=true
    post-install:
      - mkdir -p ${FLATPAK_DEST}/extensions/Plugins/yabridge
      - install yabridge-host{,-32}.exe{,.so} -Dt "${FLATPAK_DEST}/extensions/Plugins/yabridge/bin"
      - install libyabridge{,-chainloader}-{vst2,vst3,clap}.so -Dt "${FLATPAK_DEST}/extensions/Plugins/yabridge/lib"
    sources:
      - type: git
        url: https://github.com/robbert-vdh/yabridge.git
        commit: 945528cd7f898d717d772b93f939343dad122d91
      - type: git
        url: https://github.com/robbert-vdh/vst3sdk.git
        tag: "v3.7.7_build_19-patched"
        dest: subprojects/vst3
      # TODO: Get rid of this once we start building wine on our own
      - type: patch
        path: use-32bit-gcc.patch
    modules:
      - name: asio
        buildsystem: autotools
        cleanup:
          - "*"
        sources:
          - type: git
            url: https://github.com/chriskohlhoff/asio.git
            tag: "asio-1-38-0"
      - name: bitsery
        buildsystem: cmake
        cleanup:
          - "*"
        sources:
          - type: git
            url: https://github.com/fraillt/bitsery.git
            tag: "v5.2.5"
      - name: function2
        buildsystem: cmake
        cleanup:
          - "*"
        sources:
          - type: git
            url: https://github.com/Naios/function2.git
            tag: "4.2.5"
      - name: filesystem
        buildsystem: cmake
        cleanup:
          - "*"
        sources:
          - type: git
            url: https://github.com/gulrak/filesystem.git
            tag: "v1.5.14"
      - name: tomlplusplus
        buildsystem: meson
        cleanup:
          - "*"
        sources:
          - type: git
            url: https://github.com/marzer/tomlplusplus.git
            tag: "v3.4.0"
      - name: clap
        buildsystem: cmake
        cleanup:
          - "*"
        sources:
          - type: git
            url: https://github.com/free-audio/clap.git
            tag: "1.1.9"

  # Apparently the best way to build an independent project of
  # a git repo is just referencing the source again in a
  # separate module.
  - name: yabridgectl
    buildsystem: simple # flatpak has no support for cargo yet
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/yabridgectl/cargo
        CARGO_NET_OFFLINE: "true"
    subdir: tools/yabridgectl
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo build --offline --release --all-features
      - install -Dm0755 target/release/yabridgectl ${FLATPAK_DEST}/bin/yabridgectl
    sources:
      - cargo-sources.json
      - type: git
        url: https://github.com/robbert-vdh/yabridge.git
        commit: 945528cd7f898d717d772b93f939343dad122d91
        # hash:
